<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ 'Edit Karyawan' if employee else 'Tambah Karyawan' }}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px 40px;
    }

    .top-link {
      margin-bottom: 14px;
    }

    .top-link a {
      text-decoration: none;
      color: #3730a3;
      font-weight: 700;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 26px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #0f172a;
    }

    .header p {
      margin: 0;
      color: #64748b;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    .field input,
    .field textarea {
      min-height: 44px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .hint {
      font-size: 12px;
      color: #64748b;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      height: 44px;
      padding: 0 18px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }

      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-link">
      <a href="{{ url_for('karyawan.employees_list') }}">← Kembali ke Data Karyawan</a>
    </div>

    <div class="card">
      <div class="header">
        <h1>{{ 'Edit Karyawan' if employee else 'Tambah Karyawan' }}</h1>
        <p>
          {{ 'Perbarui data karyawan di bawah ini.' if employee else 'Isi data karyawan baru dengan lengkap.' }}
        </p>
      </div>
    {% if error %}
    <div style="margin-bottom:16px; padding:12px 14px; background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; border-radius:12px; font-weight:600;">
    {{ error }}
    </div>
    {% endif %}
      <form method="post">
        <div class="form-grid">

          <div class="field">
            <label for="no_id">No ID</label>
            <input
              type="text"
              id="no_id"
              name="no_id"
              value="{{ employee.no_id if employee else '' }}"
              required
            >
          </div>

          <div class="field">
            <label for="nama">Nama</label>
            <input
              type="text"
              id="nama"
              name="nama"
              value="{{ employee.nama if employee else '' }}"
              required
            >
          </div>

          <div class="field">
            <label for="bagian">Bagian</label>
            <input
              type="text"
              id="bagian"
              name="bagian"
              value="{{ employee.bagian if employee else '' }}"
              placeholder="Contoh: Borongan / Beku / Admin / Produksi"
            >
          </div>

          <div class="field">
            <label for="jabatan">Jabatan</label>
            <input
              type="text"
              id="jabatan"
              name="jabatan"
              value="{{ employee.jabatan if employee else '' }}"
              placeholder="Contoh: Kupas / Belah / PK / Mandor"
            >
          </div>

          <div class="field">
            <label for="status_aktif">Status Aktif</label>
            <input
              type="number"
              id="status_aktif"
              name="status_aktif"
              value="{{ employee.status_aktif if employee else 1 }}"
              min="0"
              max="1"
              required
            >
            <div class="hint">Isi 1 = aktif, 0 = nonaktif.</div>
          </div>

          <div class="field">
            <label for="tanggal_masuk">Tanggal Masuk</label>
            <input
              type="date"
              id="tanggal_masuk"
              name="tanggal_masuk"
              value="{{ employee.tanggal_masuk if employee and employee.tanggal_masuk else '' }}"
            >
          </div>

          <div class="field">
            <label for="fingerprint_id">Fingerprint ID</label>
            <input
              type="text"
              id="fingerprint_id"
              name="fingerprint_id"
               value="{{ '' if not employee or employee.fingerprint_id in [None, 'None', ''] else employee.fingerprint_id }}"
              placeholder="Isi jika digunakan"
            >
          </div>

          <div class="field">
            <label for="no_hp">No HP</label>
            <input
              type="text"
              id="no_hp"
              name="no_hp"
              value="{{ employee.no_hp if employee else '' }}"
              placeholder="Contoh: 0812xxxxxxx"
            >
          </div>
          <div class="field">
          <label for="gaji_harian">Gaji Harian</label>
          <input
             type="number"
             id="gaji_harian"
             name="gaji_harian"
             value="{{ employee.gaji_harian if employee else '' }}"
             placeholder="Contoh: 100000">
          </div>
          <div class="field">
            <label for="tipe_gaji">Tipe Gaji</label>
            <input
              type="text"
              id="tipe_gaji"
              name="tipe_gaji"
              value="{{ employee.tipe_gaji if employee else '' }}"
              placeholder="Contoh: harian / bulanan / borongan">
          </div>

          <div class="field">
            <label for="area_kerja">Area Kerja</label>
            <input
              type="text"
              id="area_kerja"
              name="area_kerja"
              value="{{ employee.area_kerja if employee else '' }}"
              placeholder="Contoh: normal / coldroom">
          </div>

          <div class="field">
            <label for="shift_default">Shift Default</label>
            <input
              type="text"
              id="shift_default"
              name="shift_default"
              value="{{ employee.shift_default if employee else '' }}"
              placeholder="Contoh: PAGI / SORE / MALAM">
          </div>

          <div class="field">
            <label for="tinggal_di_mes">Tinggal di Mes</label>
             <select id="tinggal_di_mes" name="tinggal_di_mes">
             <option value="0" {{ 'selected' if employee and employee.tinggal_di_mes == 0 else '' }}>Tidak</option>
             <option value="1" {{ 'selected' if employee and employee.tinggal_di_mes == 1 else '' }}>Ya</option>
             </select>
          </div>
          <div class="field full">
            <label for="catatan">Catatan</label>
            <textarea
              id="catatan"
              name="catatan"
              placeholder="Catatan tambahan jika ada"
            >{{ employee.catatan if employee else '' }}</textarea>
          </div>

        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary">
            {{ 'Update Karyawan' if employee else 'Simpan Karyawan' }}
          </button>
          <a href="{{ url_for('karyawan.employees_list') }}" class="btn btn-secondary">Batal</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
