<h2>Table: {{table_name}}</h2>

<div style="margin-bottom:15px">

Total rows: <b>{{total}}</b>

&nbsp;&nbsp;

<button onclick="addRow('{{table_name}}')">
Add Data
</button>

</div>

<table border="1" cellpadding="6" cellspacing="0"
style="border-collapse:collapse;font-size:13px;width:100%">

<thead style="background:#eee">
<tr>
{% for c in cols %}
<th>{{c}}</th>
{% endfor %}
<th>Action</th>
</tr>
</thead>

<tbody>

{% for r in rows %}
<tr>

{% for c in cols %}
<td>{{r[c]}}</td>
{% endfor %}

<td>

<button onclick="editRow('{{table_name}}', {{r['id']}})">
Edit
</button>

<button onclick="deleteRow('{{table_name}}', {{r['id']}})">
Delete
</button>

</td>

</tr>
{% endfor %}

</tbody>
</table>

<br>

<div>

{% if page > 1 %}
<a href="?page={{page-1}}">⬅ Prev</a>
{% endif %}

&nbsp; Page {{page}} &nbsp;

{% if (page*per_page) < total %}
<a href="?page={{page+1}}">Next ➜</a>
{% endif %}
<script>

function deleteRow(table, id){

    if(!confirm("Hapus data ini?")) return;

    fetch(`/admin/db/delete/${table}/${id}`,{
        method:"POST"
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.ok){
            location.reload();
        }else{
            alert(res.msg || "Delete gagal");
        }
    })

}

function editRow(table,id){
    window.location = `/admin/db/edit/${table}/${id}`;
}

function addRow(table){
    window.location = `/admin/db/add/${table}`;
}

</script>
</div>
