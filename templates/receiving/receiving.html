<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Receiving</title>

<style>
body{font-family:Arial,sans-serif;padding:24px;background:#f3f4f6}
h2{margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:6px}
input,select{padding:10px;border:1px solid #d1d5db;border-radius:10px}
input[readonly]{background:#f9fafb}
.btn{padding:10px 14px;border:0;border-radius:10px;font-weight:600;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.btn-secondary{background:#111827;color:#fff}
.partai{background:#fff;border-radius:14px;padding:16px;margin-top:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.section{margin-top:14px;padding-top:12px;border-top:1px dashed #e5e7eb}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #e5e7eb;padding:8px}
th{background:#f9fafb}
.muted{font-size:13px;color:#6b7280}
</style>
</head>

<body>
<h2>Receiving</h2>

<div class="grid4">
  <div class="field">
    <label>Tanggal</label>
    <input id="tanggal" type="date">
  </div>
 <div class="field">
  <label>Supplier</label>
  <div style="display:flex; gap:6px">
    <select id="supplier" style="flex:1"></select>
    <button type="button" class="btn btn-secondary" onclick="showAddSupplier()">+</button>
  </div>
</div>
  <div class="field">
    <label>Jenis Udang</label>
    <select id="jenis"></select>
  </div>
  <div class="field">
  <label>Total Fiber</label>
  <input id="fiber-total" readonly>
</div>
  <div class="field">
    <label>&nbsp;</label>
    <button type="button" class="btn btn-primary" id="btnSave">Save</button>
  </div>
</div>

<div id="partaiContainer"></div>

<script>
const $ = id => document.getElementById(id);
let partaiKe = 0;

function getJenisMode(){
  const sel = $("jenis");
  const opt = sel?.selectedOptions?.[0];
  return (opt?.dataset?.mode || "udang_size").toLowerCase();
}

function applyJenisToPartai(div){
  const mode = getJenisMode();

  const sampling = div.querySelector(".section.sampling");
  const kupasan  = div.querySelector(".section.kupasan");
  const manual   = div.querySelector(".section.manual");

  if (sampling) sampling.style.display = "none";
  if (kupasan)  kupasan.style.display  = "none";
  if (manual)   manual.style.display   = "none";

  if (mode === "kupasan") {
    if (kupasan) kupasan.style.display = "block";
  } else if (mode === "manual_grade") {
    if (manual) manual.style.display = "block";
  } else {
    if (sampling) sampling.style.display = "block";
  }
}

function applyJenisAll(){
  document.querySelectorAll(".partai").forEach(p => applyJenisToPartai(p));
}

/* ================= SUPPLIER ================= */
async function loadSuppliers() {
  const sel = $("supplier");
  sel.innerHTML = `<option value="">-- Pilih Supplier --</option>`;

  try {
    const res = await fetch("/master/suppliers");
    const json = await res.json();

    if (!res.ok || !json.ok) {
      alert(json.msg || "Gagal load supplier");
      return;
    }

    const suppliers = json.data || [];
    for (const s of suppliers) {
      const opt = document.createElement("option");
      opt.value = s.nama;
      opt.textContent = s.nama;
      sel.appendChild(opt);
    }
  } catch (err) {
    console.error("Supplier load error:", err);
    alert("Error koneksi supplier");
  }
}

/* ================= JENIS (MASTER) ================= */
async function loadJenis() {
  const sel = $("jenis");
  sel.innerHTML = `<option value="">-- Pilih --</option>`;

  try{
    const res = await fetch("/master/jenis");
    const json = await res.json();
    if(!res.ok || !json.ok){
      console.warn("master jenis gagal:", json);
      // fallback minimal supaya tetap jalan
      sel.innerHTML = `
        <option value="">-- Pilih --</option>
        <option value="vannamei" data-mode="udang_size">Vannamei</option>
        <option value="dogol" data-mode="udang_size">Dogol</option>
        <option value="kupasan" data-mode="kupasan">Kupasan</option>
      `;
      applyJenisAll();
      return;
    }

    // dukung format: {rows:[...]} atau {data:[...]}
    const rows = json.rows || json.data || [];

    // pastikan ada mode (default udang_size)
    const opts = [`<option value="">-- Pilih --</option>`].concat(
      rows
        .filter(r => (r.is_active ?? 1) == 1)
        .sort((a,b)=> (a.sort_order||0) - (b.sort_order||0))
        .map(r=>{
          const nama = (r.nama || "").trim();
          const mode = (r.mode || "udang_size").trim();
          return `<option value="${nama}" data-mode="${mode}">${nama}</option>`;
        })
    );

    sel.innerHTML = opts.join("");
    applyJenisAll();

  }catch(e){
    console.error("loadJenis error:", e);
    // fallback
    sel.innerHTML = `
      <option value="">-- Pilih --</option>
      <option value="vannamei" data-mode="udang_size">Vannamei</option>
      <option value="dogol" data-mode="udang_size">Dogol</option>
      <option value="kupasan" data-mode="kupasan">Kupasan</option>
    `;
    applyJenisAll();
  }
}

$("jenis")?.addEventListener("change", () => {
  applyJenisAll();

  // kalau mode bukan udang_size, kosongkan size/round agar tidak misleading
  const mode = getJenisMode();
  if(mode !== "udang_size"){
    document.querySelectorAll(".partai").forEach(div=>{
      const p = div.dataset.no;
      const size = $(`size-${p}`);
      const round = $(`round-${p}`);
      if(size) size.value = "";
      if(round) round.value = "";
    });
  }
});

/* ================= SAVE RECEIVING ================= */
async function saveReceiving() {
  if (!$("tanggal").value) { alert("Tanggal wajib diisi"); return; }
  if (!$("supplier").value) { alert("Supplier wajib dipilih"); return; }
  if (!$("jenis").value) { alert("Jenis wajib dipilih"); return; }

  const mode = getJenisMode();

  const payload = {
    tanggal: $("tanggal").value,
    supplier: $("supplier").value,
    jenis: $("jenis").value,
    partai: []
  };

  try {
    document.querySelectorAll(".partai").forEach(div => {
      const p = div.dataset.no;

      const tara = Number($(`tara-${p}`)?.value || 0);
      if (tara <= 0) throw `Tara keranjang wajib diisi di Partai #${p}`;

      const timbangan = [];
      div.querySelectorAll(".inp-berat").forEach(inp => {
        const v = Number(inp.value);
        if (v > 0) timbangan.push(v);
      });

      // ambil fields sesuai mode
      const pcs = Number($(`pcs-${p}`)?.value || 0);
      const kg_sample = Number($(`kg-${p}`)?.value || 0);
      const kategori_kupasan = $(`kupasan-${p}`)?.value || null;
      const grade_manual = ($(`grade-${p}`)?.value || "").trim() || null;

      // optional validasi:
      if(mode === "kupasan" && !kategori_kupasan){
        throw `Kategori kupasan wajib dipilih di Partai #${p}`;
      }
      if(mode === "manual_grade" && !grade_manual){
        throw `Grade wajib diisi di Partai #${p}`;
      }

      payload.partai.push({
        partai_no: Number(p),
        pcs: mode === "udang_size" ? pcs : 0,
        kg_sample: mode === "udang_size" ? kg_sample : 0,
        tara_per_keranjang: tara,
        kategori_kupasan: mode === "kupasan" ? kategori_kupasan : null,
        grade_manual: mode === "manual_grade" ? grade_manual : null,
        fiber: Number($(`fiber-${p}`)?.value) || 0,
        note: $(`note-${p}`)?.value || "",
        timbangan: timbangan
      });
    });
  } catch (msg) {
    alert(msg);
    return;
  }

  console.log("PAYLOAD:", payload);

  const res = await fetch("/receiving/save", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const json = await res.json();
  if (!json.ok) {
    alert(json.msg || "Gagal simpan");
    return;
  }

  alert("Data berhasil disimpan");
  window.location.href = "/receiving/list";
}

document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("btnSave");
  if (btn) btn.onclick = saveReceiving;
});

/* ================= PARTAI ================= */
function buatPartai(){
  partaiKe++;

  const d = document.createElement("div");
  d.className = "partai";
  d.dataset.no = partaiKe;

  d.innerHTML = `
    <h3>Partai #${partaiKe}</h3>
    <div class="section manual" style="display:none">
     <div class="field">
    <label>Grade</label>
    <input id="grade-${partaiKe}" type="text" placeholder="contoh: A / B / S / L">
      </div>
     </div>
    <!-- ===== SAMPLING (UDANG SIZE) ===== -->
    <div class="section sampling">
      <div class="grid4">
        <div class="field">
          <label>PCS</label>
          <input id="pcs-${partaiKe}" type="number">
        </div>

        <div class="field">
          <label>Kg Sample</label>
          <input id="kg-${partaiKe}" type="number" step="0.01">
        </div>

        <div class="field">
          <label>Size</label>
          <input id="size-${partaiKe}" readonly>
        </div>

        <div class="field">
          <label>Round Size</label>
          <input id="round-${partaiKe}" readonly>
        </div>
      </div>
    </div>

    <!-- ===== KUPASAN ===== -->
    <div class="section kupasan" style="display:none">
      <div class="field">
        <label>Kategori Kupasan</label>
        <select id="kupasan-${partaiKe}">
          <option value="">-- Pilih --</option>
          <option value="besar">Besar</option>
          <option value="kecil">Kecil</option>
        </select>
      </div>
    </div>

    <!-- ===== MANUAL GRADE (CUMI / IKAN / DLL) ===== -->
    <div class="section manual" style="display:none">
      <div class="field">
        <label>Grade</label>
        <input id="grade-${partaiKe}" type="text" placeholder="contoh: S / M / L">
      </div>
    </div>

    <!-- ===== TIMBANGAN SUMMARY ===== -->
    <div class="section">
      <div class="grid4">
        <div class="field">
          <label>Keranjang</label>
          <input id="keranjang-${partaiKe}" readonly>
        </div>

        <div class="field">
          <label>Tara</label>
          <input id="tara-${partaiKe}" type="number" step="0.01" value="0">
        </div>

        <div class="field">
          <label>Total Tara</label>
          <input id="total-tara-${partaiKe}" readonly>
        </div>

        <div class="field">
          <label>Bruto</label>
          <input id="bruto-${partaiKe}" readonly>
        </div>

        <div class="field">
          <label>Netto</label>
          <input id="netto-${partaiKe}" readonly>
        </div>

        <div class="field">
          <label>Jumlah Fiber</label>
          <input class="fiber-partai" id="fiber-${partaiKe}" type="number" step="0.01">
        </div>

        <div class="field">
          <label>Catatan</label>
          <input id="note-${partaiKe}" placeholder="Kondisi udang">
        </div>
      </div>
    </div>

    <!-- ===== TABEL TIMBANGAN ===== -->
    <table>
      <thead>
        <tr><th>No</th><th>Berat</th></tr>
      </thead>
      <tbody id="tb-${partaiKe}"></tbody>
    </table>

    <button type="button" class="btn btn-secondary" onclick="tambahBaris(${partaiKe})">+ Baris</button>
    <button type="button" class="btn btn-secondary btn-new-partai">+ Partai Baru</button>
  `;

  $("partaiContainer").appendChild(d);

  // apply mode tampilan sesuai jenis yg dipilih
  applyJenisToPartai(d);

  d.querySelector(".btn-new-partai").onclick = buatPartai;

  tambahBaris(partaiKe);

  // EVENT SIZE hanya meaningful kalau mode udang_size
  const pcsInp = $(`pcs-${partaiKe}`);
  const kgInp  = $(`kg-${partaiKe}`);
  if(pcsInp) pcsInp.oninput = () => { if(getJenisMode()==="udang_size") hitungSize(partaiKe); };
  if(kgInp)  kgInp.oninput  = () => { if(getJenisMode()==="udang_size") hitungSize(partaiKe); };

  $(`tara-${partaiKe}`).oninput = () => hitungBerat(partaiKe);

  // fiber total
  const fiberInput = d.querySelector(".fiber-partai");
  if (fiberInput) fiberInput.addEventListener("input", hitungFiberTotal);
}

function hitungFiberTotal() {
  let total = 0;
  document.querySelectorAll(".fiber-partai").forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) total += v;
  });
  const ft = $("fiber-total");
  if(ft) ft.value = total > 0 ? total.toFixed(2) : "";
}

function tambahBaris(p){
  const tb = document.getElementById(`tb-${p}`);
  const no = tb.children.length + 1;

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${no}</td>
    <td>
      <input type="number" step="0.01" min="0" max="60" class="inp-berat">
    </td>
  `;

  tb.appendChild(tr);

  const inp = tr.querySelector("input");

  inp.addEventListener("input", () => hitungBerat(p));

  inp.addEventListener("blur", () => {
    let v = parseFloat(inp.value);
    if (isNaN(v)) { inp.value = ""; return; }
    if (v < 5) { alert("Berat minimal 5 kg per timbangan"); v = 5; }
    else if (v > 60) { alert("Berat maksimal 60 kg per timbangan"); v = 60; }
    inp.value = v;
    hitungBerat(p);
  });

  inp.onkeydown = (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      tambahBaris(p);
    }
  };

  inp.focus();
}

/* ================= HITUNG ================= */
function hitungBerat(p){
  const inputs = document.querySelectorAll(`#tb-${p} input`);

  let bruto = 0;
  let keranjang = 0;

  inputs.forEach(i => {
    const v = parseFloat(i.value);
    if (!isNaN(v) && v > 0) {
      bruto += v;
      keranjang += 1;
    }
  });

  const taraPerKeranjang = parseFloat($(`tara-${p}`).value);
  const taraValid = !isNaN(taraPerKeranjang) && taraPerKeranjang > 0;

  const totalTara = taraValid ? keranjang * taraPerKeranjang : 0;
  const netto = Number((bruto - totalTara).toFixed(2));

  $(`keranjang-${p}`).value = keranjang || "";
  $(`bruto-${p}`).value = bruto > 0 ? bruto.toFixed(2) : "";
  $(`total-tara-${p}`).value = totalTara > 0 ? totalTara.toFixed(2) : "";
  $(`netto-${p}`).value = netto > 0 ? netto.toFixed(2) : "";
}

function hitungSize(p) {
  const pcsRaw = ($(`pcs-${p}`).value || "").toString().replace(",", ".");
  const kgRaw  = ($(`kg-${p}`).value || "").toString().replace(",", ".");

  const pcs = parseFloat(pcsRaw);
  const kg  = parseFloat(kgRaw);

  if (pcs > 0 && kg > 0) {
    const sizeRaw = pcs / kg;
    const size = Math.round(sizeRaw * 10) / 10;
    const round = Math.round(sizeRaw);

    $(`size-${p}`).value  = size.toFixed(1);
    $(`round-${p}`).value = round;
  } else {
    $(`size-${p}`).value  = "";
    $(`round-${p}`).value = "";
  }
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  await loadSuppliers();
  await loadJenis();
  buatPartai();
});

/* ================= ADD SUPPLIER MODAL ================= */
function showAddSupplier(){
  $("supplierName").value = "";
  $("supplierModal").style.display = "block";
  $("supplierName").focus();
}

function hideAddSupplier(){
  $("supplierModal").style.display = "none";
}

async function addSupplier(e){
  e.preventDefault();
  const btn = e.target;
  btn.disabled = true;

  const nama = $("supplierName").value.trim();
  if (!nama) {
    alert("Nama supplier wajib diisi");
    btn.disabled = false;
    return;
  }

  const res = await fetch("/master/suppliers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nama })
  });

  if (!res.ok) {
    alert("Server error");
    btn.disabled = false;
    return;
  }

  const json = await res.json();
  if (!json.ok) {
    alert(json.msg);
    btn.disabled = false;
    return;
  }

  await loadSuppliers();
  $("supplier").value = nama;
  hideAddSupplier();
  btn.disabled = false;
}
</script>

<div id="supplierModal"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.3)">
  <div style="background:#fff; padding:16px; border-radius:12px;
              max-width:320px; margin:100px auto">
    <h4>Tambah Supplier</h4>

    <input id="supplierName" placeholder="Nama supplier" style="width:100%">

    <div style="margin-top:12px; display:flex; gap:8px; justify-content:end">
      <button class="btn btn-secondary" onclick="hideAddSupplier()">Batal</button>
      <button class="btn btn-primary" onclick="addSupplier(event)">Simpan</button>
    </div>
  </div>
</div>

</body>
</html>
